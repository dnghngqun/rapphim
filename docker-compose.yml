services:
  postgres:
    image: postgres:16-alpine
    container_name: rapphim-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rapphim}
      POSTGRES_USER: ${POSTGRES_USER:-rapphim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rapphim_secret_2024}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      # Named volume — hoạt động ổn định trên Windows+WSL2
      # Xem/backup dữ liệu bằng: docker-compose exec postgres pg_dump ...
      - rapphim_pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rapphim}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rapphim-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@rapphim.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rapphim-backend
    ports:
      - "4000:4000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-rapphim}
      - POSTGRES_USER=${POSTGRES_USER:-rapphim}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rapphim_secret_2024}
      - PORT=4000
      - NODE_ENV=production
      - PYTHON_BIN=/app/scraper-venv/bin/python
      - SCRAPER_INTERVAL_MINUTES=${SCRAPER_INTERVAL_MINUTES:-30}
      # API Keys
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # Thư mục ghi log crawl bên trong container (được mount ra host bên dưới)
      - SCRAPER_LOG_DIR=/app/scraper/logs
    volumes:
      # Mount thư mục scraper logs ra host để xem file txt trực tiếp
      - D:/Code/code/rapphim/scraper/logs:/app/scraper/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rapphim-frontend
    ports:
      - "5173:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    depends_on:
      - backend
    restart: unless-stopped

  db-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: rapphim-db-backup
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-rapphim}
      POSTGRES_USER: ${POSTGRES_USER:-rapphim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rapphim_secret_2024}
      SCHEDULE: "@every 30m" # Tự động backup mỗi 30 phút
      BACKUP_KEEP_MINS: 180  # Giữ các bản backup trong 3 tiếng gần nhất (để tránh đầy ổ)
      BACKUP_KEEP_DAYS: 3    # Đồng thời giữ lại 1 bản backup cho 3 ngày gần nhất
    volumes:
      - D:/Code/code/rapphim/DataDB:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped


volumes:
  rapphim_pgdata:
    driver: local
